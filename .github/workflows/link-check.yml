name: Link check

# Catches link rot automatically: runs weekly, on demand, and on PRs that touch markdown.
# On the weekly run, a broken link opens a tracking issue.

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"

permissions:
  issues: write
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: lychee link check
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --max-concurrency 4 --output ./lychee/out.md './**/*.md'"
          fail: false

      - name: Open an issue on broken links
        if: steps.lychee.outputs.exit_code != 0 && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected by the weekly link check"
          content-filepath: ./lychee/out.md
          labels: link-rot
